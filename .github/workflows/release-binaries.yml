name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.archive_suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive_suffix: macos-arm64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/yt-transcript" dist/yt-transcript
          archive="yt-transcript-${GITHUB_REF_NAME}-${{ matrix.archive_suffix }}.tar.gz"
          tar -C dist -czf "$archive" yt-transcript

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 "$archive" > "$archive.sha256"
          else
            sha256sum "$archive" > "$archive.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-transcript-${{ matrix.archive_suffix }}
          path: |
            yt-transcript-${{ github.ref_name }}-${{ matrix.archive_suffix }}.tar.gz
            yt-transcript-${{ github.ref_name }}-${{ matrix.archive_suffix }}.tar.gz.sha256

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.sha256
          generate_release_notes: true
